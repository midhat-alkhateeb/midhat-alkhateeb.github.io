<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: #F5E642;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: "Doto", sans-serif;
        overflow: hidden;
    }

    /* ── BACKGROUND SHAPES ── */
    .bg-shapes {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
    }
    .bg-shapes svg { width: 100%; height: 100%; }

    /* ── HEADER / TICKER ── */
    .header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background: #F02D8C;
        color: #F5E642;
        z-index: 1000;
        overflow: hidden;
        display: flex;
        align-items: center;
    }

    .ticker-inner {
        display: flex;
        align-items: center;
        white-space: nowrap;
        will-change: transform;
        font-family: "DotGothic16", sans-serif;
        font-size: 24px;
        letter-spacing: 2px;
        flex-shrink: 0;
        color: #F5E642;
    }
    .ticker-inner span { display: inline-block; }
    .sep {
        color: rgb(245, 230, 66);
        margin: 0 25px;
        display: inline-flex; align-items: center
    }

    .header-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
        background: #F02D8C;
    }
    .header:hover .header-overlay {
        opacity: 1;
        pointer-events: all;
    }
    .nav-link {
        display: flex;
        align-items: center;
        gap: 7px;
        color: #ffffff;
        text-decoration: none;
        font-family: "Doto", sans-serif;
        font-size: 24px;
        font-weight: 900;
        font-variation-settings: "ROND" 100;
        letter-spacing: 1px;
        transition: opacity 0.15s ease;
    }
    .nav-link:hover { opacity: 0.65; }
    .nav-link svg { width: 20px; height: 20px; fill: #ffffff; flex-shrink: 0; }

    /* ── MAIN CONTENT ── */
    .content {
        flex: 1;
        padding: 20px 28px;
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        position: relative;
        z-index: 1;
    }

    h1 {
        font-size: clamp(80px, 13vw, 300px);
        color: #F02D8C;
        font-weight: 900;
        font-variation-settings: "ROND" 100;
        line-height: 0.88;
        letter-spacing: -2px;
    }

    /* ── FOOTER ── */
    footer {
        background: #080808;
        color: #F5E642;
        text-align: center;
        padding: 20px;
        font-family: "Doto", sans-serif;
        font-size: 16px;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
    }

<script>
    const inner = document.getElementById('tickerInner');
    const header = document.getElementById('header');
    const SPEED = 60;

    function makeUnit() {
        const frag = document.createDocumentFragment();
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '✦';
        const word = document.createElement('span');
        word.textContent = 'HIRE ME\u00A0';
        frag.appendChild(sep);
        frag.appendChild(word);
        return frag;
    }

    const probe = document.createElement('div');
    probe.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-family:"DotGothic16",sans-serif;font-size:24px;letter-spacing:2px;';
    probe.appendChild(makeUnit());
    document.body.appendChild(probe);

    document.fonts.ready.then(() => {
        const unitWidth = probe.offsetWidth;
        document.body.removeChild(probe);

        const needed = Math.ceil((window.innerWidth * 3) / unitWidth) + 6;
        for (let i = 0; i < needed; i++) inner.appendChild(makeUnit());

        let offset = 0, lastTime = null, paused = false;
        header.addEventListener('mouseenter', () => paused = true);
        header.addEventListener('mouseleave', () => paused = false);

        function tick(ts) {
            if (lastTime !== null && !paused) {
                const delta = (ts - lastTime) / 1000;
                offset += SPEED * delta;
                if (offset >= unitWidth) offset -= unitWidth;
                inner.style.transform = `translateX(${-offset}px)`;
            }
            lastTime = ts;
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    });
</script>
